<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vinyl Desk · Drag & Drop Edition</title>
    
    <!-- Fonts & Icons -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Modal -->
    <div class="auth-modal" id="authModal" style="display: none;">
        <div class="auth-content">
            <div class="auth-header">
                <h2><i class="fas fa-record-vinyl"></i> Vinyl Desk</h2>
                <button class="close-auth" onclick="document.getElementById('authModal').style.display='none'">&times;</button>
            </div>
            
            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')">Login</button>
                <button class="auth-tab" onclick="switchAuthTab('signup')">Sign Up</button>
            </div>
            
            <form id="loginForm" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="loginEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-submit">Login</button>
            </form>
            
            <form id="signupForm" class="auth-form" onsubmit="handleSignup(event)">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="signupUsername" placeholder="Username" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-envelope"></i>
                    <input type="email" id="signupEmail" placeholder="Email" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="signupPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="auth-submit">Sign Up</button>
            </form>
        </div>
    </div>

    <!-- User Profile Button -->
    <button class="user-profile-btn" id="userProfileBtn" onclick="showUserMenu()">
        <i class="fas fa-user-circle"></i>
        <span id="usernameDisplay">Guest</span>
    </button>

    <!-- User Menu Dropdown -->
    <div class="user-menu" id="userMenu" style="display: none;">
        <div class="user-menu-header">
            <span id="menuUsername">Guest</span>
            <span id="menuAvatar">🎵</span>
        </div>
        <div class="user-menu-stats">
            <div><i class="fas fa-trophy"></i> <span id="statHighScore">0</span></div>
            <div><i class="fas fa-fish"></i> <span id="statFish">0</span></div>
            <div><i class="fas fa-music"></i> <span id="statTracks">0</span></div>
        </div>
        <div class="user-menu-item" onclick="viewCollection()">
            <i class="fas fa-record-vinyl"></i> My Collection
        </div>
        <div class="user-menu-item" onclick="viewPlaylists()">
            <i class="fas fa-list"></i> My Playlists
        </div>
        <div class="user-menu-item" onclick="viewAchievements()">
            <i class="fas fa-medal"></i> Achievements
        </div>
        <div class="user-menu-divider"></div>
        <div class="user-menu-item" onclick="logout()">
            <i class="fas fa-sign-out-alt"></i> Logout
        </div>
    </div>

    <div class="drag-overlay" id="dragOverlay">
        <i class="fas fa-music"></i>
        <span>Drop MP3 files anywhere</span>
    </div>

    <div class="desk">
        <div class="header">
            <h1 class="title">
                <i class="fas fa-record-vinyl"></i>
                Vinyl Desk
                <span class="badge">Drag & Drop</span>
            </h1>
            <div class="time" id="currentTime"></div>
        </div>

        <!-- Input Tabs -->
        <div class="input-tabs">
            <button class="tab-btn active" id="tabLink">
                <i class="fas fa-link"></i> YouTube Link
            </button>
            <button class="tab-btn" id="tabFile">
                <i class="fas fa-file-audio"></i> MP3 Files
            </button>
        </div>

        <!-- Link Input Panel -->
        <div class="input-section" id="linkSection">
            <div class="input-panel">
                <i class="fab fa-youtube"></i>
                <input type="text" id="linkInput" placeholder="Paste YouTube link... (e.g., https://youtu.be/...)" value="https://www.youtube.com/watch?v=jfKfPfyJRdk">
                <button class="action-btn" id="playBtn">
                    <i class="fas fa-play"></i>
                </button>
            </div>
            <div class="input-note">
                <i class="fas fa-info-circle"></i> Note: Some videos block embedding. If one fails, try another!
            </div>
        </div>

        <!-- File Upload Panel (hidden initially) -->
        <div class="input-section" id="fileSection" style="display: none;">
            <div class="file-area" id="fileArea">
                <i class="fas fa-cloud-upload-alt"></i>
                <h3>Drag & Drop MP3 Files Here</h3>
                <p>or click to browse</p>
                <input type="file" id="fileInput" multiple accept=".mp3,audio/mpeg" style="display: none;">
                <div class="file-info" id="fileInfo"></div>
            </div>
        </div>

        <!-- Player Stage -->
        <div class="player-stage">
            <div class="turntable-container">
                <div class="turntable">
                    <div class="plinth"></div>
                    <div class="vinyl" id="vinyl">
                        <div class="label">
                            <i class="fas fa-music"></i>
                        </div>
                    </div>
                </div>
                <div class="tonearm" id="tonearm"></div>
            </div>

            <div class="visualizer-container">
                <canvas id="visualizer" width="400" height="200"></canvas>
                
                <div class="now-playing">
                    <div class="track-status" id="statusText">Ready</div>
                    <div class="track-title" id="trackTitle">Drop a file or paste a link</div>
                    <div class="track-meta" id="trackMeta">00:00 / 00:00</div>
                    
                    <!-- Save to Collection Button -->
                    <button class="ctrl-btn" id="saveToCollectionBtn" style="margin-top: 10px; width: 100%;" onclick="window.desk.saveCurrentTrack()">
                        <i class="fas fa-save"></i> Save to Collection
                    </button>
                </div>

                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>

                <div class="volume-control">
                    <i class="fas fa-volume-down"></i>
                    <input type="range" id="volumeSlider" min="0" max="100" value="70">
                    <i class="fas fa-volume-up"></i>
                </div>
            </div>
        </div>

        <!-- Control Bar -->
        <div class="control-bar">
            <button class="ctrl-btn" id="prevBtn"><i class="fas fa-backward"></i> Prev</button>
            <button class="ctrl-btn" id="playPauseBtn"><i class="fas fa-play"></i> Play</button>
            <button class="ctrl-btn" id="nextBtn"><i class="fas fa-forward"></i> Next</button>
            <button class="ctrl-btn" id="shuffleBtn"><i class="fas fa-random"></i> Shuffle</button>
            <button class="ctrl-btn" id="repeatBtn"><i class="fas fa-repeat"></i> Repeat</button>
            <button class="ctrl-btn" id="crackleToggle"><i class="fas fa-scratch"></i> Crackle</button>
            <button class="ctrl-btn" id="rainToggle"><i class="fas fa-cloud-rain"></i> Rain</button>
            <button class="ctrl-btn" id="themeToggle"><i class="fas fa-palette"></i> Theme</button>
        </div>

        <!-- Queue Section -->
        <div class="queue-section">
            <div class="queue-header">
                <h3><i class="fas fa-list"></i> Play Queue</h3>
                <button class="ctrl-btn" id="clearQueue" style="padding: 5px 15px;">Clear</button>
            </div>
            <div id="queueList" class="queue-list"></div>
        </div>
    </div>

    <!-- Audio Elements -->
    <audio id="mainAudio" preload="auto"></audio>
    <audio id="crackleAudio" loop>
        <source src="https://www.soundjay.com/misc/vinyl-record-pop-1.mp3" type="audio/mpeg">
    </audio>
    <audio id="rainAudio" loop>
        <source src="https://www.soundjay.com/nature/rain-01.mp3" type="audio/mpeg">
    </audio>
    
    <div id="youtubeContainer"></div>

    <!-- Main JavaScript -->
    <script src="script.js"></script>
</body>
</html>
